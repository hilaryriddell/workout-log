<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hilary's Workout Log</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #1D6E56;
    --teal-l: #E1F5EE;
    --teal-m: #B8E8D8;
    --purple: #534AB7;
    --purple-l: #EEEDFE;
    --coral: #993C1D;
    --coral-l: #FAECE7;
    --amber: #854F0B;
    --amber-l: #FAEEDA;
    --dark: #1A1917;
    --mid: #5F5E5A;
    --soft: #9B9893;
    --bg: #F7F5F0;
    --card: #FFFFFF;
    --border: #E8E5DE;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    max-width: 520px;
    margin: 0 auto;
    padding: 0 0 100px 0;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--dark);
    padding: 28px 24px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 700;
    color: white;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .app-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #888;
    margin-top: 4px;
    letter-spacing: 0.05em;
  }
  .back-btn {
    background: none;
    border: none;
    color: #888;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 12px;
    transition: color 0.2s;
  }
  .back-btn:hover { color: white; }

  /* ── HOME ── */
  .home-content { padding: 24px 16px; }
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--soft);
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .day-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .day-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.2s;
    border-left: 5px solid var(--accent, #ccc);
    text-align: left;
    width: 100%;
  }
  .day-card:hover { transform: translateX(3px); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .day-card.logged { background: #FAFAF8; }
  .day-card-left {}
  .day-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--soft);
    margin-bottom: 4px;
  }
  .day-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.2;
  }
  .day-sub { font-size: 12px; color: var(--soft); margin-top: 3px; }
  .day-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .arrow { color: #ccc; font-size: 18px; margin-left: 12px; }

  .history-btn {
    width: 100%;
    padding: 14px;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.2s;
  }
  .history-btn:hover { border-color: var(--dark); color: var(--dark); }

  .today-banner {
    background: var(--teal-l);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--teal);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── WORKOUT SCREEN ── */
  .workout-content { padding: 20px 16px; }

  .progress-bar-wrap {
    background: var(--border);
    height: 4px;
    border-radius: 4px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .note-box {
    background: #F0EDE8;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
  }
  .note-box-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--soft);
    margin-bottom: 5px;
    text-transform: uppercase;
  }
  .note-box-text { font-size: 13px; color: var(--mid); line-height: 1.6; }

  .ss-block { margin-bottom: 18px; }
  .ss-header {
    border-radius: 12px 12px 0 0;
    padding: 10px 16px;
  }
  .ss-label {
    font-size: 12px;
    font-weight: 600;
    color: white;
    font-family: 'DM Sans', sans-serif;
  }
  .ss-rest { font-size: 10px; color: rgba(255,255,255,0.65); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .ss-body {
    border: 1.5px solid rgba(0,0,0,0.08);
    border-top: none;
    border-radius: 0 0 12px 12px;
    padding: 14px;
    background: white;
  }

  /* ── EXERCISE ── */
  .exercise { margin-bottom: 16px; }
  .exercise:last-child { margin-bottom: 0; }
  .ex-header { margin-bottom: 8px; }
  .ex-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .ex-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.03em;
  }
  .ex-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--dark);
  }
  .ex-done-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    color: white;
    font-family: 'DM Mono', monospace;
  }
  .ex-note { font-size: 12px; color: var(--soft); margin-top: 3px; line-height: 1.4; }
  .ex-target { font-size: 11px; font-weight: 600; margin-top: 3px; font-family: 'DM Mono', monospace; }

  .sets-list { display: flex; flex-direction: column; gap: 6px; }
  .set-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    transition: all 0.2s;
  }
  .set-row.done { border-color: var(--accent); background: var(--accent-l); }
  .set-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--soft);
    min-width: 20px;
    font-weight: 500;
  }
  .set-input {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 5px 8px;
    font-size: 14px;
    font-family: 'DM Mono', monospace;
    background: white;
    color: var(--dark);
    text-align: center;
    width: 60px;
    transition: border-color 0.2s;
  }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .set-label { font-size: 11px; color: var(--soft); }
  .check-btn {
    margin-left: auto;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: white;
    color: #ccc;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .check-btn.done { background: var(--accent); border-color: var(--accent); color: white; }

  .add-set-btn {
    margin-top: 7px;
    background: none;
    border: 1.5px dashed rgba(0,0,0,0.15);
    border-radius: 10px;
    padding: 6px 14px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
  }

  .session-notes {
    margin: 20px 0;
  }
  .session-notes textarea {
    width: 100%;
    min-height: 80px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--dark);
    background: white;
    resize: vertical;
    transition: border-color 0.2s;
  }
  .session-notes textarea:focus { outline: none; border-color: var(--dark); }

  .save-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    color: white;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .save-btn:disabled { opacity: 0.7; cursor: not-allowed; }

  /* ── HISTORY ── */
  .history-content { padding: 20px 16px; }
  .history-entry {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    border-left: 4px solid var(--accent);
  }
  .history-entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .history-entry-title { font-weight: 700; font-size: 15px; color: var(--dark); }
  .history-entry-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--soft); margin-top: 3px; }
  .history-ex-line { font-size: 13px; color: var(--mid); margin-top: 5px; }
  .history-ex-line span { font-weight: 600; color: var(--dark); }
  .history-notes { font-size: 12px; color: var(--soft); font-style: italic; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

  .status-msg {
    text-align: center;
    font-size: 13px;
    color: var(--soft);
    padding: 40px 0;
    font-family: 'DM Mono', monospace;
  }

  .saving-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 13px;
    color: var(--soft);
    padding: 10px;
    font-family: 'DM Mono', monospace;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 14px; height: 14px; border: 2px solid #eee; border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; }
</style>
</head>
<body>

<div id="app"></div>

<script>

      { label: "Superset 1 — Horizontal + Vertical pull", rest: "Rest 90 sec after each round", exercises: [
        { id: "cable_row", name: "Seated Cable Row", tag: "SS 1A", sets: 3, reps: 10, defaultWeight: 70, note: "Close grip. Pull to lower chest, squeeze shoulder blades" },
        { id: "lat_pull", name: "Lat Pulldown", tag: "SS 1B", sets: 3, reps: 12, defaultWeight: 80, note: "Wide grip. Elbows down toward back pockets" },

        { id: "face_pulls", name: "Face Pulls", tag: "SS 2B", sets: 3, reps: 10, defaultWeight: 70, note: "Cable + rope. Elbows high and wide, pull to ears" },

      { label: "Superset 3 — Shoulders + Triceps", rest: "Rest 90 sec after each round", exercises: [

  },

    supersets: [

    supersets: [
      { label: "Circuit — 3 rounds · 90 sec rest between rounds", rest: "20–30 sec rest between exercises", exercises: [

// ── STATE ──────────────────────────────────────────────────────────────────
let screen = 'home';
let activeDay = null;
let workoutSets = {};
let sessionNotes = '';
let history = [];
let savingState = 'idle';
let startTime = null;
let userDefaults = {}; // { exId: { weight, reps } }
let settingsDay = 1; // which day tab is active in settings

function loadUserDefaults() {
  try {
    const saved = localStorage.getItem('hilary_defaults');
    if (saved) userDefaults = JSON.parse(saved);
  } catch(e) {}
}

function saveUserDefaults() {
  try {
    localStorage.setItem('hilary_defaults', JSON.stringify(userDefaults));
  } catch(e) {}
}

function getDefault(ex, field) {
  if (userDefaults[ex.id] && userDefaults[ex.id][field] !== undefined) {
    return userDefaults[ex.id][field];
  }
  return field === 'weight' ? ex.defaultWeight : ex.reps;
}

function today() {
  return new Date().toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' });
}

function todayKey() {
  return new Date().toISOString().split('T')[0];
}

function allExercises(dayNum) {
  return DAYS[dayNum].supersets.flatMap(ss => ss.exercises);
}

function initWorkoutSets(dayNum) {
  const sets = {};
  allExercises(dayNum).forEach(ex => {
    const w = getDefault(ex, 'weight');
    const r = getDefault(ex, 'reps');
    sets[ex.id] = Array.from({ length: ex.sets }, () => ({
      weight: w > 0 ? String(w) : '',
      reps: String(r),
      done: false
    }));
  });
  return sets;
}

function countDone(dayNum) {
  return allExercises(dayNum).filter(ex =>
    (workoutSets[ex.id] || []).filter(s => s.done).length >= ex.sets
  ).length;
}

// ── GOOGLE SHEETS ──────────────────────────────────────────────────────────
// Tab names and headers per day
const DAY_TABS = {
  1: {
    name: 'Day 1 - Lower Body',
    header: ['Date', 'Exercise', 'Set 1 Weight', 'Set 1 Reps', 'Set 2 Weight', 'Set 2 Reps', 'Set 3 Weight', 'Set 3 Reps', 'Set 4 Weight', 'Set 4 Reps', 'Duration (min)', 'Notes']
  },
  2: {
    name: 'Day 2 - Upper Body',
    header: ['Date', 'Exercise', 'Set 1 Weight', 'Set 1 Reps', 'Set 2 Weight', 'Set 2 Reps', 'Set 3 Weight', 'Set 3 Reps', 'Set 4 Weight', 'Set 4 Reps', 'Duration (min)', 'Notes']
  },
  3: {
    name: 'Day 3 - Cardio',
    header: ['Date', 'Exercise', 'Time (min)', 'Calories', 'Duration (min)', 'Notes']
  },
  4: {
    name: 'Day 4 - Full Body',
    header: ['Date', 'Exercise', 'Set 1 Weight', 'Set 1 Reps', 'Set 2 Weight', 'Set 2 Reps', 'Set 3 Weight', 'Set 3 Reps', 'Duration (min)', 'Calories', 'Notes']
  }
};

async function loadHistory() {
  try {
    const sheetName = DAY_TABS[1].name; // load Day 1 tab to check connectivity
    const url = `${SCRIPT_URL}?sheetId=${SHEET_ID}&sheetName=${encodeURIComponent(sheetName)}`;
    const res = await fetch(url);
    const data = await res.json();
    // Build history from all days — load each tab
    history = [];
    for (const [dayNum, tab] of Object.entries(DAY_TABS)) {
      try {
        const r = await fetch(`${SCRIPT_URL}?sheetId=${SHEET_ID}&sheetName=${encodeURIComponent(tab.name)}`);
        const d = await r.json();
        const rows = (d.rows || []).slice(1); // skip header
        rows.forEach(row => { if (row[0]) history.push({ dayNum: parseInt(dayNum), tab: tab.name, row }); });
      } catch(e) {}
    }
    history.reverse();
    render();
  } catch (e) {
    console.error('Load error', e);
  }
}

function buildSheetRow(dayNum, ex, sets, duration, calories) {
  const dateStr = today();
  if (dayNum === 3) {
    // Cardio: Date, Exercise, Time (min), Calories, Duration, Notes
    const s = sets[0] || {};
    return [dateStr, ex.name, s.weight || '', s.reps || '', duration, sessionNotes];
  }
  if (dayNum === 4) {
    // Day 4: Date, Exercise, S1W, S1R, S2W, S2R, S3W, S3R, Duration, Calories, Notes
    const row = [dateStr, ex.name];
    for (let i = 0; i < 3; i++) {
      const s = sets[i] || {};
      if (ex.isPlank) {
        row.push(''); row.push(s.reps || ''); // time folded into reps col, no weight
      } else if (ex.isCardio) {
        row.push(s.weight || ''); row.push(s.reps || ''); // time=weight col, cal=reps col
      } else {
        row.push(s.weight || ''); row.push(s.reps || '');
      }
    }
    row.push(duration);
    // Calories — pull from rower finisher if present
    const rowerSets = workoutSets['rower'] || [];
    const rowerCal = rowerSets[0] ? rowerSets[0].reps : '';
    row.push(ex.isCardio ? (sets[0] ? sets[0].reps : '') : (ex.id === 'rower' ? '' : ''));
    row.push(sessionNotes);
    return row;
  }
  // Days 1 & 2: Date, Exercise, S1W, S1R, S2W, S2R, S3W, S3R, S4W, S4R, Duration, Notes
  const row = [dateStr, ex.name];
  for (let i = 0; i < 4; i++) {
    const s = sets[i] || {};
    if (ex.isPlank) {
      row.push(''); row.push(s.reps || '');
    } else {
      row.push(s.done !== false ? (s.weight || 'BW') : '');
      row.push(s.done !== false ? (s.reps || '') : '');
    }
  }
  row.push(duration);
  row.push(sessionNotes);
  return row;
}

async function saveToSheets(dayNum) {
  savingState = 'saving';
  render();

  const day = DAYS[dayNum];
  const tab = DAY_TABS[dayNum];
  const exes = allExercises(dayNum);
  const duration = startTime ? Math.round((Date.now() - startTime) / 60000) : 0;

  // Only save exercises that have at least one done set (or any entry for cardio)
  const exerciseRows = [];
  exes.forEach(ex => {
    const sets = workoutSets[ex.id] || [];
    const doneSets = ex.isCardio || ex.isPlank ? sets : sets.filter(s => s.done);
    if (doneSets.length > 0 || (ex.isCardio && sets.some(s => s.weight || s.reps))) {
      exerciseRows.push(buildSheetRow(dayNum, ex, sets, duration));
    }
  });

  if (exerciseRows.length === 0) {
    savingState = 'error';
    render();
    setTimeout(() => { savingState = 'idle'; render(); }, 3000);
    return;
  }

  try {
    // Check if tab exists and has header
    const checkRes = await fetch(`${SCRIPT_URL}?sheetId=${SHEET_ID}&sheetName=${encodeURIComponent(tab.name)}`);
    const checkData = await checkRes.json();

    // Write header if tab is empty
    if (!checkData.rows || checkData.rows.length === 0) {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ sheetId: SHEET_ID, sheetName: tab.name, row: tab.header })
      });
    }

    // Write each exercise row
    for (const row of exerciseRows) {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ sheetId: SHEET_ID, sheetName: tab.name, row })
      });
    }

    savingState = 'saved';
    await loadHistory();
    render();
    setTimeout(() => { savingState = 'idle'; render(); }, 3000);
  } catch (e) {
    console.error('Save error', e);
    savingState = 'error';
    render();
    setTimeout(() => { savingState = 'idle'; render(); }, 3000);
  }
}

// ── RENDER ─────────────────────────────────────────────────────────────────

  else if (screen === 'history') app.innerHTML = renderHistory();
  else if (screen === 'settings') app.innerHTML = renderSettings();
  attachEvents();
}

  return `
    <div class="exercise">
      <div class="ex-header">
        <div class="ex-top">
          ${ex.tag ? `<span class="ex-tag" style="background:${allDone ? day.color : day.light};color:${allDone ? 'white' : day.color}">${ex.tag}</span>` : ''}
          <span class="ex-name" style="color:${allDone ? day.color : ''}">${ex.name}</span>
          ${allDone ? `<span class="ex-done-badge" style="background:${day.color}">DONE</span>` : ''}
        </div>
        <div class="ex-note">${ex.note}</div>
        <div class="ex-target" style="color:${day.color}">${ex.isCardio ? 'Log time & calories' : ex.isPlank ? 'Log time held (sec)' : `Target: ${ex.sets} × ${ex.reps}${ex.id === 'circuit_plank' ? 's' : ex.id === 'step_touch' || ex.id === 'rower' ? '' : ' reps'}`}</div>
      </div>
      <div class="sets-list">
        ${sets.map((s, i) => `
          <div class="set-row ${s.done ? 'done' : ''}" style="${s.done ? `--accent:${day.color};--accent-l:${day.light}` : ''}">
            <span class="set-num">${ex.isCardio ? '→' : `S${i+1}`}</span>
            ${ex.isPlank ? `
              <input class="set-input" type="number" placeholder="sec" value="${s.reps}" data-action="updateReps" data-ex="${ex.id}" data-set="${i}" style="width:80px;${s.done ? `border-color:${day.color}30` : ''}">
              <span class="set-label">sec</span>
            ` : `
              <input class="set-input" type="number" placeholder="${ex.isCardio ? 'min' : 'lbs'}" value="${s.weight}" data-action="updateWeight" data-ex="${ex.id}" data-set="${i}" style="${s.done ? `border-color:${day.color}30` : ''}">
              <span class="set-label">${ex.isCardio ? 'min' : 'lbs'}</span>
              <input class="set-input" type="number" placeholder="${ex.isCardio ? 'cal' : ''}" value="${s.reps}" data-action="updateReps" data-ex="${ex.id}" data-set="${i}" style="${s.done ? `border-color:${day.color}30` : ''}">
              <span class="set-label">${ex.isCardio ? 'cal' : 'reps'}</span>

        `).join('')}

      </div>
    </div>
  `;
}

                <div style="display:flex;align-items:center;gap:6px">

  // Group by date + dayNum

  const entries = Object.values(grouped).sort((a, b) => b.date.localeCompare(a.date));

            <div>
              <div class="history-entry-title">Day ${e.dayNum} — ${DAYS[e.dayNum].name}</div>
              <div class="history-entry-date">${e.date}${e.duration ? ` · ${e.duration} min` : ''}</div>
            </div>
            <span class="day-badge" style="background:${dayLight(e.dayNum)};color:${dayColor(e.dayNum)}">${e.exercises.length} exercises</span>

// ── EVENTS ─────────────────────────────────────────────────────────────────
function attachEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleClick);
    el.addEventListener('change', handleChange);
    el.addEventListener('input', handleChange);
  });
}

function handleClick(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;

  if (action === 'openDay') {
    activeDay = parseInt(el.dataset.day);
    workoutSets = initWorkoutSets(activeDay);
    sessionNotes = '';
    startTime = Date.now();
    screen = 'workout';
    render();
  }
  else if (action === 'goHome') { screen = 'home'; render(); }
  else if (action === 'showSettings') { screen = 'settings'; render(); }
  else if (action === 'settingsDay') { settingsDay = parseInt(el.dataset.day); render(); }
  else if (action === 'showHistory') { screen = 'history'; render(); }
  else if (action === 'toggleDone') {
    const { ex, set } = el.dataset;
    if (workoutSets[ex] && workoutSets[ex][set]) {
      workoutSets[ex][parseInt(set)].done = !workoutSets[ex][parseInt(set)].done;
      render();
    }
  }
  else if (action === 'addSet') {
    const ex = DAYS[activeDay].supersets.flatMap(ss => ss.exercises).find(e => e.id === el.dataset.ex);
    if (ex) {
      workoutSets[el.dataset.ex].push({ weight: ex.defaultWeight > 0 ? String(ex.defaultWeight) : '', reps: String(ex.reps), done: false });
      render();
    }
  }
  else if (action === 'save') {
    saveToSheets(activeDay);
  }
}

function handleChange(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;
  if (action === 'updateWeight') {
    workoutSets[el.dataset.ex][parseInt(el.dataset.set)].weight = el.value;
  }
  else if (action === 'updateReps') {
    workoutSets[el.dataset.ex][parseInt(el.dataset.set)].reps = el.value;
  }
  else if (action === 'updateDefault') {
    const { ex, field } = el.dataset;
    if (!userDefaults[ex]) userDefaults[ex] = {};
    userDefaults[ex][field] = el.value === '' ? 0 : Number(el.value);
    saveUserDefaults();
  }
}
